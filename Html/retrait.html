<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="../css/style.css">
    <title>Retrait — Association</title>
  </head>
  <body>
    <header class="no-mobile-menu" style="margin:18px auto;max-width:980px;padding:12px 20px;display:flex;justify-content:space-between;align-items:center">
      <h2 style="margin:0">Retrait / Versement</h2>
      <nav aria-label="Navigation page">
        <a href="../index.html" style="color:var(--primary);font-weight:600;text-decoration:none">Retour</a>
      </nav>
    </header>
    <script src="../js/menu.js"></script>

    <main class="app">
      <div class="card">
        <div style="display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start">
          <div style="flex:1;min-width:260px">
            <label for="memberSelect">Sélectionner un membre</label>
            <select id="memberSelect" aria-label="Membre" style="width:100%;padding:10px;border-radius:8px;border:1px solid #e6e9ef">
              <option value="">-- Choisir --</option>
            </select>

            <div id="memberCard" style="margin-top:12px;padding:10px;border-radius:8px;background:linear-gradient(180deg,#fff,#fbfdff);border:1px solid rgba(15,23,42,0.03)">
              <div id="memberName" style="font-weight:700;color:var(--text)">Aucun membre sélectionné</div>
              <div id="memberMeta" style="color:var(--muted);margin-top:6px;font-size:13px">Détails affichés ici</div>
            </div>
          </div>

          <div style="flex:1;min-width:260px">
            <label for="montantRetrait">Montant à retirer</label>
            <input id="montantRetrait" type="number" min="0" placeholder="Ex: 5000" style="width:100%;padding:10px;border-radius:8px;border:1px solid #e6e9ef">

            <div id="retraitInfo" style="margin-top:10px;color:var(--muted)">Sélectionnez un membre pour voir si le retrait est autorisé.</div>

            <div style="margin-top:12px;text-align:right">
              <button id="btnRetrait" class="btn-primary">Retirer</button>
            </div>
          </div>
        </div>

        <hr style="margin:16px 0;border:none;border-top:1px solid rgba(15,23,42,0.04)" />

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="color:var(--muted)"><strong id="retraitCount">0</strong> retraits</div>
          <div>
            <button id="exportRetrait" class="btn-ghost">Exporter CSV</button>
            <button id="clearRetrait" class="btn-danger">Supprimer tous</button>
          </div>
        </div>

        <div class="table-wrap">
          <div id="retraitsContainer"></div>
        </div>
      </div>
    </main>

    <script src="../js/membre.js"></script>
    <script src="../js/app.bundle.js" defer></script>
  </body>
</html>
